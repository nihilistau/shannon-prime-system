name: ci

# Platform-gate CI for the math core — see
# ../shannon-prime-lattice/papers/PPT-LAT-Roadmap.md §3.7.
#   linux-gcc    : Tier-2 (the dev host has no local Linux)
#   windows-msvc : Tier-3 (continuous MSVC parity; the __int128 oracle is
#                  excluded on MSVC and T_NTT_3 gates against the gcc fixture)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # windows-latest ships full Visual Studio, so the VS generator finds the
      # MSVC toolchain without vcvars / third-party setup actions.
      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
