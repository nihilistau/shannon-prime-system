name: ci

# Platform-gate CI for the math core — see
# ../shannon-prime-lattice/papers/PPT-LAT-Roadmap.md §3.7.
#   linux-gcc    : Tier-2 (the dev host has no local Linux)
#   windows-msvc : Tier-3 (continuous MSVC parity; the __int128 oracle is
#                  excluded on MSVC and T_NTT_3 gates against the gcc fixture)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # bench_ts_hedge probes physical DRAM channels (calibration-only tool that
      # writes the GF(2) channel bin file).  Reserve huge pages so MAP_HUGETLB
      # succeeds; on GitHub Actions (VM) virt detection fires and the bench
      # exits 0 with REQUIRES_LIVE_MODE — this verifies the M_TS_FALLBACK gate.
      # On a bare-metal Linux runner it runs LIVE and reports the P90 ratio.
      - name: Bench M_TS_HEDGE (DISABLED/fallback on CI VM, LIVE on bare metal)
        run: |
          echo 64 | sudo tee /proc/sys/vm/nr_hugepages || true
          ./build/core/sp_channel/bench_ts_hedge

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # windows-latest ships full Visual Studio, so the VS generator finds the
      # MSVC toolchain without vcvars / third-party setup actions.
      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
